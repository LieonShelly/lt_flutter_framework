name: lt_uicomponent
description: "A new Flutter project."
publish_to: 'none'
resolution: workspace
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0



flutter:
  uses-material-design: false
  assets:
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: FeltTipSeniorRegular
      fonts:
        - asset: assets/fonts/FeltTipSeniorRegular.ttf
        
    - family: PoppinsMediumItalic
      fonts:
        - asset: assets/fonts/Poppins-MediumItalic.ttf

    - family: VividlyRegular
      fonts:
        - asset: assets/fonts/VividlyRegular.ttf