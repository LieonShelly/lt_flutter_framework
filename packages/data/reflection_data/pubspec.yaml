name: reflection_data
description: Reflection data layer with repositories and data sources
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0

dependencies:
  # Domain Layer
  reflection_domain:
    path: ../../domain/reflection_domain
  
  # Infrastructure
  lt_network:
    path: ../../core/network
  
  # Riverpod for Dependency Injection
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  
  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Utilities
  lt_annotation:
    path: ../../utls/lt_annotation

dev_dependencies:
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  test: ^1.24.0
